            const groups = {};
            const groupNames = ['A','B','C','D','E','F','G','H','I','J','K','L'];
            
            // Inicializar grupos vacíos
            groupNames.forEach(g => groups[g] = {});

                // Registrar equipos incluso si no han jugado
                [m.home, m.away].forEach(team => { 
                    if (!groups[m.group][team]) {
                        groups[m.group][team] = { name: team, pts: 0, pj: 0, gf: 0, ga: 0, gd: 0, group: m.group }; 
                    }
                });

                if (m.played) {
                    const h = groups[m.group][m.home];
                    const a = groups[m.group][m.away];
                    
                    h.pj++; a.pj++;
                    h.gf += m.hGoals; h.ga += m.aGoals; h.gd = h.gf - h.ga;
                    a.gf += m.aGoals; a.ga += m.hGoals; a.gd = a.gf - a.ga;

                    if (m.hGoals > m.aGoals) h.pts += 3;
                    else if (m.aGoals > m.hGoals) a.pts += 3;
                    else { h.pts += 1; a.pts += 1; }
                }
            });

            // Convertir a arrays y ordenar
            const sortedGroups = {};
            for (const [gName, teamsObj] of Object.entries(groups)) {
                sortedGroups[gName] = Object.values(teamsObj).sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    return b.gf - a.gf;
                });
            }
            return sortedGroups;

                        </h2>
                        <div className="flex flex-col">
                            {ASISTENCIAS.map((item, idx) => renderRow(item, idx, '👟'))}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = React.useState('grupos');
            const [isRefreshing, setIsRefreshing] = React.useState(false); // Estado para animar el botón de Refresh
            
            // Cálculos principales
            const standings = calculateStandings();
            
            // LÓGICA DEL CARRUSEL MEJORADA: Buscar partidos del día cronológicamente
            const activeMatches = MATCHES.filter(m => m.played === 'live');
            
            // WOW FEATURE: Cambiar el título de la pestaña si hay partidos en vivo
            React.useEffect(() => {
                if (activeMatches.length > 0) {
                    document.title = `🔴 [LIVE] Mundial 2026`;
                } else {
                    document.title = `Mundial 2026 - Visualizador`;
                }
            }, [activeMatches.length]);

            // Efecto para hacer scroll al inicio al cambiar de pestaña
            React.useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [activeTab]);

            // Función para DESTRUIR LA CACHÉ
            const forceRefresh = () => {
                setIsRefreshing(true);
                setTimeout(() => {
                    // Crea una URL con un parámetro aleatorio de tiempo para saltarse la caché sí o sí
                    const url = new URL(window.location.href);
                    url.searchParams.set('v', new Date().getTime());
                    window.location.href = url.toString();
                }, 400); // Pequeño delay para que se vea la animación
            };
            
            // 🔥 NUEVA FEATURE: Auto-Refresh (Short Polling) 🔥
            React.useEffect(() => {
                let interval;
                // Solo activamos el loop automático si detectamos partidos en estado 'live'
                if (activeMatches.length > 0) {
                    // Refrescar cada 3 minutos (180,000 milisegundos)
                    interval = setInterval(() => {
                        forceRefresh();
                    }, 180000);
                }
                // Limpieza de memoria (buena práctica en React)
                return () => {
                    if (interval) clearInterval(interval);
                };
            }, [activeMatches.length]);

            // Calcular TODO el ranking de los 3ros
            const thirdPlaces = [];
            for (const group in standings) {
                if (standings[group][2]) thirdPlaces.push(standings[group][2]);
            }
            
            // Ordenar a todos los terceros con las reglas oficiales
            const allThirds = thirdPlaces.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });
            
            // Extraer el Top 8 para usarlo en otras vistas (ej. KnockoutView)
            const bestThirds = allThirds.slice(0, 8); 

            // FIX FECHA DINÁMICA
            const playedMatches = MATCHES.filter(m => m.played === true || m.played === 'live');
            let latestDateObj = { date: "19 Jun" };
            if (playedMatches.length > 0) {
                latestDateObj = playedMatches.reduce((latest, current) => {
                    const getScore = (dateStr) => {
                        const [d, m] = dateStr.split(' ');
                        return (m.startsWith('Jul') ? 700 : 600) + parseInt(d);
                    };
                    return getScore(current.date) > getScore(latest.date) ? current : latest;
                });
            }
            const [dDay, dMonth] = latestDateObj.date.split(' ');
            const latestDate = `${dDay} ${dMonth.startsWith('Jul') ? 'Julio' : 'Junio'}`;

            let currentDayMatches = [];
            let todayLabel = "";

            if (activeMatches.length > 0) {
                todayLabel = activeMatches[0].date;
            } else {
                const unplayedMatches = MATCHES.filter(m => m.played === false);
                if (unplayedMatches.length > 0) {
                    unplayedMatches.sort((a, b) => {
                        const getScore = (dateStr) => {
                            const [d, m] = dateStr.split(' ');
                            return (m.startsWith('Jul') ? 700 : 600) + parseInt(d);
                        };
                        return getScore(a.date) - getScore(b.date);
                    });
                    todayLabel = unplayedMatches[0].date;
                } else {
                    todayLabel = MATCHES[MATCHES.length - 1].date;
                }
            }
            
            currentDayMatches = MATCHES.filter(m => m.date === todayLabel);
            currentDayMatches.sort((a, b) => a.time.localeCompare(b.time));

            return (
                <div className="max-w-md mx-auto min-h-screen relative flex flex-col">
                    {/* Header Pega al Top */}
                    <header className="bg-gradient-to-r from-blue-900 to-teal-800 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-black tracking-tight flex items-center gap-2">
                                    Mundial '26
                                </h1>
                                <p className="text-teal-200 text-sm font-medium">Visualizador Interactivo</p>
                            </div>
                            
                            {/* NUEVO UI: Contenedor con Fecha y Botón de Recarga Anti-Caché */}
                            <div className="flex items-center gap-2">
                                <div className="text-right text-xs bg-white/10 px-3 py-1.5 rounded-lg border border-white/20 backdrop-blur-sm">
                                    <span className="block font-bold opacity-80">Datos al</span>
                                    {latestDate}
                                </div>
                                <button 
                                    onClick={forceRefresh}
                                    title="Buscar últimos goles"
                                    className="bg-white/10 hover:bg-white/20 border border-white/20 text-white p-2.5 rounded-lg backdrop-blur-sm transition-all active:scale-95 flex items-center justify-center"
                                >
                                    <svg className={`w-4 h-4 ${isRefreshing ? 'animate-spin-once' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        {/* Tabs Navigation */}
                        <div className="flex gap-6 mt-6 border-b border-white/20 overflow-x-auto hide-scrollbar">
                            <button 
                                onClick={() => setActiveTab('grupos')}
                                className={`pb-2 px-1 text-sm whitespace-nowrap transition-all duration-300 ${activeTab === 'grupos' ? 'border-b-4 border-teal-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Tablas de Grupos
                            </button>
                            <button 
                                onClick={() => setActiveTab('cruces')}
                                className={`pb-2 px-1 text-sm whitespace-nowrap transition-all duration-300 ${activeTab === 'cruces' ? 'border-b-4 border-orange-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Camino a la Final
                            </button>
                            <button 
                                onClick={() => setActiveTab('estadisticas')}
                                className={`pb-2 px-1 text-sm whitespace-nowrap transition-all duration-300 ${activeTab === 'estadisticas' ? 'border-b-4 border-yellow-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Estadísticas
                            </button>
                        </div>
                    </header>

                    {/* Content Area */}
                    <main className="flex-1 p-4 mt-2">
                        {activeTab === 'grupos' && (
                            <>
                                <TodayMatchesCarousel matches={currentDayMatches} todayLabel={todayLabel} />
                                <StandingsView standings={standings} bestThirds={bestThirds} />
                            </>
                        )}
                        {activeTab === 'cruces' && <KnockoutView standings={standings} bestThirds={bestThirds} />}
                        
                        {/* 🔥 Le pasamos a StatsView TODO el array de terceros 🔥 */}
                        {activeTab === 'estadisticas' && <StatsView allThirds={allThirds} />}
                    </main>
                    
                    <footer className="flex flex-col items-center justify-center p-5 text-xs text-gray-400 border-t bg-gray-50 mt-auto gap-4">
                        <p className="text-center">
                            Aplicación interactiva diseñada por Kineti (<a href="https://www.kineti.com.co" target="_blank" rel="noopener noreferrer" className="text-teal-600 hover:underline font-medium">kineti.com.co</a>). Los cruces dinámicos se basan en proyecciones del momento.
                        </p>
                        
                        {/* CONTADOR DE VISITAS FUNCIONAL */}
                        <div className="flex flex-col items-center gap-1">
                            <span className="text-[10px] font-semibold uppercase tracking-widest text-gray-400">Visitas Familiares</span>
                            <img 
                                src="https://api.visitorbadge.io/api/visitors?path=mundial26.alex.familia&labelColor=%23f3f4f6&countColor=%23ea580c&labelStyle=none" 
                                alt="Contador de visitas" 
                                className="h-5 shadow-sm rounded-sm"
                            />
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
