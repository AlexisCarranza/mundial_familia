        const calculateStandings = () => {
            const groups = {};
            const groupNames = ['A','B','C','D','E','F','G','H','I','J','K','L'];
            groupNames.forEach(g => groups[g] = {});

            MATCHES.forEach(m => {
                [m.home, m.away].forEach(team => { 
                    if (!groups[m.group][team]) {
                        groups[m.group][team] = { name: team, pts: 0, pj: 0, gf: 0, ga: 0, gd: 0, group: m.group }; 
                    }
                });

                if (m.played) {
                    const h = groups[m.group][m.home];
                    const a = groups[m.group][m.away];
                    
                    h.pj++; a.pj++;
                    h.gf += m.hGoals; h.ga += m.aGoals; h.gd = h.gf - h.ga;
                    a.gf += m.aGoals; a.ga += m.hGoals; a.gd = a.gf - a.ga;

                    if (m.hGoals > m.aGoals) h.pts += 3;
                    else if (m.aGoals > m.hGoals) a.pts += 3;
                    else { h.pts += 1; a.pts += 1; }
                }
            });

            const sortedGroups = {};
            for (const [gName, teamsObj] of Object.entries(groups)) {
                sortedGroups[gName] = Object.values(teamsObj).sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    return b.gf - a.gf;

                if (match.hPens !== undefined && match.aPens !== undefined) {

                    if (match.aPens > match.hPens) return getLoser ? match.home : match.away;

            };

                    if (m.homeRef) {

                        homeTeam = refMatch ? getWinner(refMatch, m.isLoserBracket) : `TBD`;

                    if (m.awayRef) {

                        awayTeam = refMatch ? getWinner(refMatch, m.isLoserBracket) : `TBD`;

        const StatsView = ({ allThirds }) => {
            const renderRow = (item, index, icon) => (
                <div key={index} className={`flex items-center justify-between py-3 border-b border-gray-100 last:border-0 transition-colors px-2 rounded ${index === 0 ? 'bg-yellow-50/50 border-l-2 border-l-yellow-400' : 'hover:bg-gray-50'}`}>
                    <div className="flex items-center gap-3">
                        <div className="w-6 flex justify-center items-center">
                            {index === 0 ? <span className="text-xl drop-shadow-sm" title="1er Lugar">🥇</span> :
                             index === 1 ? <span className="text-lg drop-shadow-sm" title="2do Lugar">🥈</span> :
                             index === 2 ? <span className="text-lg drop-shadow-sm" title="3er Lugar">🥉</span> :
                             <span className="font-bold text-gray-400">{index + 1}</span>}
                        </div>
                        <div>
                            <p className="font-bold text-gray-900 text-sm leading-tight flex items-center gap-1">
                                {item.name}
                                {index === 0 && <span className="text-[10px] animate-pulse">🔥</span>}
                            </p>
                            <div className="flex items-center gap-1.5 mt-1">
                                <img src={getFlagUrl(item.team)} className="w-4 h-3 rounded-[1px] shadow-sm" />
                                <span className="text-xs text-gray-500">{item.team}</span>
                            </div>
                        </div>
                    </div>
                    <div className="flex items-center gap-5 text-sm">
                        <div className="flex flex-col items-center">
                            <span className="text-[9px] text-gray-400 font-bold uppercase mb-0.5">PJ</span>
                            <span className="text-gray-600 font-medium">{item.played}</span>
                        </div>
                        <div className="flex flex-col items-center min-w-[32px] bg-gray-50 rounded px-1.5 py-1">
                            <span className="text-[9px] text-gray-400 font-bold uppercase mb-0.5">{icon === '⚽' ? 'Goles' : 'Asist.'}</span>
                            <span className="font-black text-gray-900 flex items-center gap-1">
                                {item.count} <span className="text-[10px]">{icon}</span>
                            </span>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 pb-12">
                    {/* 1. GOLEADORES */}
                    <div className="card p-4 border-t-4 border-yellow-400">
                        <h2 className="text-xl font-extrabold text-gray-800 mb-4 flex items-center gap-2">
                            <span className="text-2xl">⚽</span> Top Goleadores
                        </h2>
                        <div className="flex flex-col">
                            {GOLEADORES.map((item, idx) => renderRow(item, idx, '⚽'))}
                        </div>
                    </div>

                    {/* 2. ASISTENCIAS */}
                    <div className="card p-4 border-t-4 border-blue-400">
                        <h2 className="text-xl font-extrabold text-gray-800 mb-4 flex items-center gap-2">
                            <span className="text-2xl">👟</span> Top Asistencias
                        </h2>
                        <div className="flex flex-col">
                            {ASISTENCIAS.map((item, idx) => renderRow(item, idx, '👟'))}
                        </div>
                    </div>

                    {/* 3. RANKING MEJORES 3ROS */}
                    <div className="card p-4 border-t-4 border-orange-400">
                        <h2 className="text-xl font-extrabold text-gray-800 mb-1 flex items-center gap-2">
                            <span>🔥 Ranking Mejores 3ros</span>
                        </h2>
                        <p className="text-xs text-gray-500 mb-4">La carrera en vivo por los 8 cupos a la siguiente fase.</p>
                        
                        <div className="flex flex-col">
                            {allThirds.map((team, index) => (
                                <React.Fragment key={team.name}>
                                    {index === 8 && (
                                        <div className="border-t-2 border-dashed border-red-300 my-3 relative">
                                            <span className="absolute -top-2.5 left-1/2 transform -translate-x-1/2 bg-white px-2 text-[9px] font-black text-red-500 uppercase tracking-widest rounded-full border border-red-200">
                                                Línea de Eliminación
                                            </span>
                                        </div>
                                    )}
                                    <div className={`flex items-center justify-between py-2 border-b border-gray-100 last:border-0 transition-colors px-2 rounded ${index < 8 ? 'hover:bg-orange-50/50' : 'opacity-60 bg-gray-50 hover:bg-gray-100 grayscale-[0.2]'}`}>
                                        <div className="flex items-center gap-3">
                                            <span className={`w-5 text-center font-bold ${index < 8 ? 'text-orange-500' : 'text-gray-400'}`}>
                                                {index + 1}
                                            </span>
                                            <div className="flex items-center gap-2">
                                                <img src={getFlagUrl(team.name)} className="w-4 h-3 rounded-[1px] shadow-sm" />
                                                <span className={`font-bold text-sm ${team.name === 'Colombia' ? 'colombia-text' : 'text-gray-900'}`}>{team.name}</span>
                                                <span className="text-[9px] text-gray-400 font-bold ml-1">GRP {team.group}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center gap-3 text-xs">
                                            <div className="flex flex-col items-center w-6">
                                                <span className="text-[8px] text-gray-400 font-bold">PTS</span>
                                                <span className="font-black text-gray-800">{team.pts}</span>
                                            </div>
                                            <div className="flex flex-col items-center w-6">
                                                <span className="text-[8px] text-gray-400 font-bold">GD</span>
                                                <span className="font-semibold text-gray-600">{team.gd > 0 ? `+${team.gd}` : team.gd}</span>
                                            </div>
                                            <div className="flex flex-col items-center w-6">
                                                <span className="text-[8px] text-gray-400 font-bold">GF</span>
                                                <span className="font-semibold text-gray-600">{team.gf}</span>
                                            </div>
                                        </div>
                                    </div>
                                </React.Fragment>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            // 👉 INICIA DIRECTO EN CRUCES
            const [activeTab, setActiveTab] = React.useState('cruces');
            const [isRefreshing, setIsRefreshing] = React.useState(false); 
            
            // 1. Calculamos Tablas de Grupos
            const standings = calculateStandings();
            
            // 2. Extraemos Mejores Terceros
            const thirdPlaces = [];
            for (const group in standings) {
                if (standings[group][2]) thirdPlaces.push(standings[group][2]);
            }
            const allThirds = thirdPlaces.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });
            const bestThirds = allThirds.slice(0, 8); 

            // 3. Calculamos partidos de 16vos 
            const sixteenMatchups = resolveSixteenMatches(standings, bestThirds);

            // 4. Resolvemos todo el árbol de la fase final
            const resolvedKnockouts = resolveKnockoutTeams(KNOCKOUT_MATCHES, sixteenMatchups);
            
            const allMatches = [...MATCHES, ...resolvedKnockouts];
            const activeMatches = allMatches.filter(m => m.played === 'live');
            
            React.useEffect(() => {
                if (activeMatches.length > 0) {
                    document.title = `🔴 [LIVE] Mundial 2026`;
                } else {
                    document.title = `Mundial 2026 - Visualizador`;
                }
            }, [activeMatches.length]);

            React.useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [activeTab]);

            const forceRefresh = () => {
                setIsRefreshing(true);
                setTimeout(() => {
                    const url = new URL(window.location.href);
                    url.searchParams.set('v', new Date().getTime());
                    window.location.href = url.toString();
                }, 400); 
            };
            
            React.useEffect(() => {
                let interval;
                if (activeMatches.length > 0) {
                    interval = setInterval(() => {
                        forceRefresh();
                    }, 180000);
                }
                return () => {
                    if (interval) clearInterval(interval);
                };
            }, [activeMatches.length]);

            const playedMatches = allMatches.filter(m => m.played === true || m.played === 'live');
            let latestDateObj = { date: "19 Jun" };
            if (playedMatches.length > 0) {
                latestDateObj = playedMatches.reduce((latest, current) => {
                    const getScore = (dateStr) => {
                        const [d, m] = dateStr.split(' ');
                        return (m.startsWith('Jul') ? 700 : 600) + parseInt(d);
                    };
                    return getScore(current.date) > getScore(latest.date) ? current : latest;
                });
            }
            const [dDay, dMonth] = latestDateObj.date.split(' ');
            const latestDate = `${dDay} ${dMonth.startsWith('Jul') ? 'Julio' : 'Junio'}`;

            let currentDayMatches = [];
            let todayLabel = "";

            if (activeMatches.length > 0) {
                todayLabel = activeMatches[0].date;
            } else {
                const unplayedMatches = allMatches.filter(m => m.played === false);
                if (unplayedMatches.length > 0) {
                    unplayedMatches.sort((a, b) => {
                        const getScore = (dateStr) => {
                            const [d, m] = dateStr.split(' ');
                            return (m.startsWith('Jul') ? 700 : 600) + parseInt(d);
                        };
                        return getScore(a.date) - getScore(b.date);
                    });
                    todayLabel = unplayedMatches[0].date;
                } else {
                    todayLabel = allMatches[allMatches.length - 1].date;
                }
            }
            
            currentDayMatches = allMatches.filter(m => m.date === todayLabel);
            currentDayMatches.sort((a, b) => a.time.localeCompare(b.time));

            return (
                <div className="max-w-md mx-auto min-h-screen relative flex flex-col">
                    <header className="bg-gradient-to-r from-blue-900 to-teal-800 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-black tracking-tight flex items-center gap-2">
                                    Mundial '26
                                </h1>
                                <p className="text-teal-200 text-sm font-medium">Visualizador Interactivo</p>
                            </div>
                            
                            <div className="flex items-center gap-2">
                                <div className="text-right text-xs bg-white/10 px-3 py-1.5 rounded-lg border border-white/20 backdrop-blur-sm">
                                    <span className="block font-bold opacity-80">Datos al</span>
                                    {latestDate}
                                </div>
                                <button 
                                    onClick={forceRefresh}
                                    title="Buscar últimos goles"
                                    className="bg-white/10 hover:bg-white/20 border border-white/20 text-white p-2.5 rounded-lg backdrop-blur-sm transition-all active:scale-95 flex items-center justify-center"
                                >
                                    <svg className={`w-4 h-4 ${isRefreshing ? 'animate-spin-once' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        {/* 👉 TABS REORGANIZADOS: Cruces -> Estadísticas -> Grupos */}
                        <div className="flex gap-6 mt-6 border-b border-white/20 overflow-x-auto hide-scrollbar">
                            <button 
                                onClick={() => setActiveTab('cruces')}
                                className={`pb-2 px-1 text-sm whitespace-nowrap transition-all duration-300 ${activeTab === 'cruces' ? 'border-b-4 border-orange-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Camino a la Final
                            </button>
                            <button 
                                onClick={() => setActiveTab('estadisticas')}
                                className={`pb-2 px-1 text-sm whitespace-nowrap transition-all duration-300 ${activeTab === 'estadisticas' ? 'border-b-4 border-yellow-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Estadísticas
                            </button>
                            <button 
                                onClick={() => setActiveTab('grupos')}
                                className={`pb-2 px-1 text-sm whitespace-nowrap transition-all duration-300 ${activeTab === 'grupos' ? 'border-b-4 border-teal-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Fase de Grupos
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-4 mt-2">
                        {(activeTab === 'grupos' || activeTab === 'cruces') && (
                            <TodayMatchesCarousel matches={currentDayMatches} todayLabel={todayLabel} />
                        )}

                        {/* 👉 COMPONENTES REORDENADOS */}
                        {activeTab === 'cruces' && <KnockoutView resolvedMatches={resolvedKnockouts} />}
                        {activeTab === 'estadisticas' && <StatsView allThirds={allThirds} />}
                        {activeTab === 'grupos' && <StandingsView standings={standings} bestThirds={bestThirds} />}
                    </main>
                    
                    <footer className="flex flex-col items-center justify-center p-5 text-xs text-gray-400 border-t bg-gray-50 mt-auto gap-4">
                        <p className="text-center">
                            Aplicación interactiva diseñada por Kineti (<a href="https://www.kineti.com.co" target="_blank" rel="noopener noreferrer" className="text-teal-600 hover:underline font-medium">kineti.com.co</a>). Los cruces dinámicos se basan en proyecciones del momento.
                        </p>
                        
                        <div className="flex flex-col items-center gap-1">
                            <span className="text-[10px] font-semibold uppercase tracking-widest text-gray-400">Visitas Familiares</span>
                            <img 
                                src="https://api.visitorbadge.io/api/visitors?path=mundial26.alex.familia&labelColor=%23f3f4f6&countColor=%23ea580c&labelStyle=none" 
                                alt="Contador de visitas" 
                                className="h-5 shadow-sm rounded-sm"
                            />
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
