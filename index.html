            const groups = {};
            const groupNames = ['A','B','C','D','E','F','G','H','I','J','K','L'];
            
            // Inicializar grupos vacíos
            groupNames.forEach(g => groups[g] = {});

            MATCHES.forEach(m => {
                // Registrar equipos incluso si no han jugado
                [m.home, m.away].forEach(team => { 
                    if (!groups[m.group][team]) {
                        groups[m.group][team] = { name: team, pts: 0, pj: 0, gf: 0, ga: 0, gd: 0, group: m.group }; 
                    }
                });

                if (m.played) {
                    const h = groups[m.group][m.home];
                    const a = groups[m.group][m.away];
                    
                    h.pj++; a.pj++;
                    h.gf += m.hGoals; h.ga += m.aGoals; h.gd = h.gf - h.ga;
                    a.gf += m.aGoals; a.ga += m.hGoals; a.gd = a.gf - a.ga;

                    if (m.hGoals > m.aGoals) h.pts += 3;
                    else if (m.aGoals > m.hGoals) a.pts += 3;
                    else { h.pts += 1; a.pts += 1; }
                }
            });

            // Convertir a arrays y ordenar
            const sortedGroups = {};
            for (const [gName, teamsObj] of Object.entries(groups)) {
                sortedGroups[gName] = Object.values(teamsObj).sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    return b.gf - a.gf;
                });
            }
            return sortedGroups;
        };

        };

        const KnockoutView = ({ standings, bestThirds }) => {
            const getTeam = (group, pos) => standings[group] && standings[group][pos-1] ? standings[group][pos-1] : { name: `TBD (Grp ${group})` };
            
            // Reglas FIFA OFICIALES
            const fixedMatches = [
                { title: "P73: 2º Grupo A vs 2º Grupo B", t1: getTeam('A',2), t2: getTeam('B',2), date: '28 Jun', venue: 'Los Ángeles' },
                { title: "P75: 1º Grupo F vs 2º Grupo C", t1: getTeam('F',1), t2: getTeam('C',2), date: '29 Jun', venue: 'Monterrey' },
                { title: "P76: 1º Grupo C vs 2º Grupo F", t1: getTeam('C',1), t2: getTeam('F',2), date: '29 Jun', venue: 'Houston' },
                { title: "P78: 2º Grupo E vs 2º Grupo I", t1: getTeam('E',2), t2: getTeam('I',2), date: '30 Jun', venue: 'Dallas' },
                { title: "P83: 2º Grupo K vs 2º Grupo L", t1: getTeam('K',2), t2: getTeam('L',2), date: '2 Jul', venue: 'Toronto' },
                { title: "P84: 1º Grupo H vs 2º Grupo J", t1: getTeam('H',1), t2: getTeam('J',2), date: '2 Jul', venue: 'Los Ángeles' },
                { title: "P86: 1º Grupo J vs 2º Grupo H", t1: getTeam('J',1), t2: getTeam('H',2), date: '3 Jul', venue: 'Miami' },
                { title: "P88: 2º Grupo D vs 2º Grupo G", t1: getTeam('D',2), t2: getTeam('G',2), date: '3 Jul', venue: 'Dallas' }
            ];

            const dynamicMatchesRaw = [
                { title: "P74: 1º Grupo E vs 3º A/B/C/D/F", leader: getTeam('E',1), targets: ['A','B','C','D','F'], date: '29 Jun', venue: 'Boston' },
                { title: "P77: 1º Grupo I vs 3º C/D/F/G/H", leader: getTeam('I',1), targets: ['C','D','F','G','H'], date: '30 Jun', venue: 'Nueva York/NJ' },
                { title: "P79: 1º Grupo A vs 3º C/E/F/H/I", leader: getTeam('A',1), targets: ['C','E','F','H','I'], date: '30 Jun', venue: 'CDMX' },
                { title: "P80: 1º Grupo L vs 3º E/H/I/J/K", leader: getTeam('L',1), targets: ['E','H','I','J','K'], date: '1 Jul', venue: 'Atlanta' },
                { title: "P81: 1º Grupo D vs 3º B/E/F/I/J", leader: getTeam('D',1), targets: ['B','E','F','I','J'], date: '1 Jul', venue: 'San Francisco' },
                { title: "P82: 1º Grupo G vs 3º A/E/H/I/J", leader: getTeam('G',1), targets: ['A','E','H','I','J'], date: '1 Jul', venue: 'Seattle' },
                { title: "P85: 1º Grupo B vs 3º E/F/G/I/J", leader: getTeam('B',1), targets: ['E','F','G','I','J'], date: '2 Jul', venue: 'Vancouver' },
                { title: "P87: 1º Grupo K vs 3º D/E/I/J/L", leader: getTeam('K',1), targets: ['D','E','I','J','L'], date: '3 Jul', venue: 'Kansas City' }
            ];

            // ALGORITMO ANTIDUPLICADOS
            let availableThirds = [...bestThirds];
            const dynamicMatches = dynamicMatchesRaw.map(m => {
                const teamIdx = availableThirds.findIndex(t => m.targets.includes(t.group));
                let assigned = null;
                if (teamIdx !== -1) {
                    assigned = availableThirds[teamIdx];
                    availableThirds.splice(teamIdx, 1); 
                }
                return {
                    ...m,
                    t1: m.leader,
                    t2: assigned || { name: `TBD (3º ${m.targets.join('/')})`, isTBD: true }
                };
            });

            const MatchCard = ({ matchInfo, type }) => {
                const isDynamic = type === 'dynamic';
                const borderColor = isDynamic ? 'border-orange-400' : 'border-blue-500';
                const t2IsTBD = matchInfo.t2.isTBD || matchInfo.t2.name.includes('TBD');

                return (
                    <div className={`card p-3 mb-3 border-l-4 ${borderColor}`}>
                        {/* Cabecera */}
                        <div className="flex justify-between items-center mb-3 pb-1.5 border-b border-gray-100">
                            <span className="text-[10px] text-gray-500 font-bold uppercase tracking-wide">{matchInfo.title}</span>
                            <div className="flex gap-2 text-[10px] text-gray-500 font-medium bg-gray-50 px-2 py-0.5 rounded">
                                <span>🗓️ {matchInfo.date}</span>
                                <span>📍 {matchInfo.venue}</span>
                            </div>
                        </div>
                        {/* Equipos */}
                        <div className="flex justify-between items-center text-sm">
                            <div className="flex items-center gap-2 w-[42%]">
                                <img src={getFlagUrl(matchInfo.t1.name)} className={`flag shadow-sm ${matchInfo.t1.name.includes('TBD') ? 'opacity-30 grayscale' : ''}`} />
                                <span className={`font-bold truncate ${matchInfo.t1.name.includes('TBD') ? 'text-gray-400 text-xs' : 'text-gray-900'}`}>{matchInfo.t1.name}</span>
                            </div>
                            
                            <div className="w-[16%] flex justify-center">
                                <span className="text-gray-300 font-black text-[11px] bg-gray-50 px-2 py-1 rounded">VS</span>
                            </div>

                            <div className="flex flex-col items-end w-[42%]">
                                <div className="flex items-center gap-2 justify-end w-full">
                                    <span className={`font-bold truncate text-right ${t2IsTBD ? 'text-gray-400 text-xs' : 'text-gray-900'}`}>
                                        {matchInfo.t2.name}
                                    </span>
                                    <img src={getFlagUrl(matchInfo.t2.name)} className={`flag shadow-sm ${t2IsTBD ? 'opacity-30 grayscale' : ''}`} />
                                </div>
                                {isDynamic && !t2IsTBD && (
                                    <span className="text-[8px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded mt-1 font-bold tracking-wide">PROYECCIÓN</span>
                                )}
                            </div>
                        </div>

                        {/* Cuadro de Terceros Dinámico restaurado */}
                        {isDynamic && (
                            <div className="bg-orange-50/50 border border-orange-100/60 p-2.5 rounded-lg mt-3">
                                <p className="text-[10px] font-bold text-orange-800 uppercase tracking-wide mb-2">Candidatos actuales (Mejores 3ros)</p>
                                <div className="flex flex-wrap gap-2">
                                    {matchInfo.targets.map(g => {
                                        const t = getTeam(g, 3);
                                        if (!t || t.name.includes("TBD")) return null;
                                        const best = bestThirds.some(bt => bt.name === t.name);
                                        return (
                                            <div key={g} className={`flex items-center gap-1.5 px-2 py-1.5 rounded text-[12px] transition-all duration-300 ${best ? 'bg-white border border-orange-300 text-gray-900 font-semibold shadow-sm' : 'bg-gray-100 border border-gray-200 text-gray-400'}`}>
                                                <img src={getFlagUrl(t.name)} className={`w-4 h-3 rounded-[1px] ${!best && 'opacity-40 grayscale'}`} />
                                                <span>{t.name}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="text-[9px] text-orange-700/60 mt-2.5 flex items-center gap-3 font-medium">
                                    <span className="flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-white border border-orange-400 block"></span> Clasificando</span>
                                    <span className="flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-gray-200 border border-gray-300 block"></span> Fuera del top 8</span>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="pb-12">
                    <h2 className="text-xl font-extrabold text-blue-900 mb-4 flex items-center gap-2">
                        <span className="w-6 h-6 bg-blue-100 text-blue-800 flex items-center justify-center rounded-full text-xs">16</span>
                        Dieciseisavos de Final
                    </h2>
                    
                    <h3 className="text-sm font-bold text-gray-500 uppercase mb-3 ml-2">Emparejamientos Fijos</h3>
                    <div className="mb-6">
                        {fixedMatches.map((m, i) => <MatchCard key={`f-${i}`} matchInfo={m} type="fixed" />)}
                    </div>

                    <h3 className="text-sm font-bold text-orange-600 uppercase mb-3 ml-2 flex items-center gap-2">
                        <span>Cruces Dinámicos</span>
                        <span className="bg-orange-100 text-orange-700 text-[9px] px-1.5 py-0.5 rounded font-bold">Mejores 3ros</span>
                    </h3>
                    <div className="mb-8">
                        {dynamicMatches.map((m, i) => <MatchCard key={`d-${i}`} matchInfo={m} type="dynamic" />)}
                    </div>

                    {/* FASES FINALES REALES */}
                    <div className="mt-8 pt-6 border-t-2 border-dashed border-gray-300">
                        <h2 className="text-xl font-extrabold text-gray-400 mb-4 text-center">Fases Finales</h2>
                        <div className="space-y-3 opacity-80">
                            <div className="grid grid-cols-2 gap-2">
                                <div className="card p-3 bg-gray-50 border border-gray-200 text-center flex flex-col items-center justify-center">
                                    <span className="font-bold text-gray-600 text-sm">Octavos</span>
                                    <span className="text-[10px] text-gray-400 mt-0.5">4-7 Jul (8 sedes)</span>
                                </div>
                                <div className="card p-3 bg-gray-50 border border-gray-200 text-center flex flex-col items-center justify-center">
                                    <span className="font-bold text-gray-600 text-sm">Cuartos</span>
                                    <span className="text-[10px] text-gray-400 mt-0.5">9-11 Jul (4 sedes)</span>
                                </div>
                            </div>
                            
                            <div className="flex gap-2 justify-center">
                                <div className="card p-3 bg-gray-50 border border-gray-200 text-center flex flex-col items-center justify-center w-1/2">
                                    <span className="font-bold text-gray-600 text-sm">Semifinal 1</span>
                                    <span className="text-[10px] text-gray-400 mt-0.5">14 Jul - Dallas</span>
                                </div>
                                <div className="card p-3 bg-gray-50 border border-gray-200 text-center flex flex-col items-center justify-center w-1/2">
                                    <span className="font-bold text-gray-600 text-sm">Semifinal 2</span>
                                    <span className="text-[10px] text-gray-400 mt-0.5">15 Jul - Atlanta</span>
                                </div>
                            </div>

                            <div className="flex gap-2 justify-center">
                                 <div className="card p-3 bg-gray-50 border border-gray-200 text-center flex flex-col items-center justify-center w-full">
                                    <span className="font-bold text-gray-600 text-sm">3er Puesto</span>
                                    <span className="text-[10px] text-gray-400 mt-0.5">18 Jul - Miami</span>
                                </div>
                            </div>

                            <div className="card p-4 bg-gradient-to-r from-gray-200 to-gray-300 border-2 border-gray-300 text-center flex flex-col items-center justify-center shadow-inner mt-2">
                                <span className="font-black text-gray-700 uppercase tracking-widest">Gran Final</span>
                                <span className="text-xs font-bold text-gray-600 mt-1">19 Jul - Nueva York/NJ</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // NUEVO COMPONENTE: Vista de Estadísticas
        const StatsView = () => {
            const renderRow = (item, index, icon) => (
                <div key={index} className="flex items-center justify-between py-3 border-b border-gray-100 last:border-0 hover:bg-gray-50 transition-colors px-2 rounded">
                    <div className="flex items-center gap-3">
                        <span className={`w-5 text-center font-bold ${index === 0 ? 'text-yellow-500 text-lg' : index === 1 ? 'text-gray-400' : index === 2 ? 'text-amber-700' : 'text-gray-300'}`}>
                            {index + 1}
                        </span>
                        <div>
                            <p className="font-bold text-gray-900 text-sm leading-tight">{item.name}</p>
                            <div className="flex items-center gap-1.5 mt-1">
                                <img src={getFlagUrl(item.team)} className="w-4 h-3 rounded-[1px] shadow-sm" />
                                <span className="text-xs text-gray-500">{item.team}</span>
                            </div>
                        </div>
                    </div>
                    <div className="flex items-center gap-5 text-sm">
                        <div className="flex flex-col items-center">
                            <span className="text-[9px] text-gray-400 font-bold uppercase mb-0.5">PJ</span>
                            <span className="text-gray-600 font-medium">{item.played}</span>
                        </div>
                        <div className="flex flex-col items-center min-w-[32px] bg-gray-50 rounded px-1.5 py-1">
                            <span className="text-[9px] text-gray-400 font-bold uppercase mb-0.5">{icon === '⚽' ? 'Goles' : 'Asist.'}</span>
                            <span className="font-black text-gray-900 flex items-center gap-1">
                                {item.count} <span className="text-[10px]">{icon}</span>
                            </span>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 pb-12">
                    <div className="card p-4 border-t-4 border-yellow-400">
                        <h2 className="text-xl font-extrabold text-gray-800 mb-4 flex items-center gap-2">
                            <span>Goleadores</span>
                        </h2>
                        <div className="flex flex-col">
                            {GOLEADORES.map((item, idx) => renderRow(item, idx, '⚽'))}
                        </div>
                    </div>

                    <div className="card p-4 border-t-4 border-blue-400">
                        <h2 className="text-xl font-extrabold text-gray-800 mb-4 flex items-center gap-2">
                            <span>Asistencias</span>
                        </h2>
                        <div className="flex flex-col">
                            {ASISTENCIAS.map((item, idx) => renderRow(item, idx, '👟'))}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = React.useState('grupos');
            
            // Cálculos principales
            const standings = calculateStandings();
            
            // Calcular mejores 3ros
            const thirdPlaces = [];
            for (const group in standings) {
                if (standings[group][2]) thirdPlaces.push(standings[group][2]);
            }
            const bestThirds = thirdPlaces.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            }).slice(0, 8); // Top 8

            // FIX FECHA DINÁMICA
            const playedMatches = MATCHES.filter(m => m.played);
            let latestDate = "19 Junio";
            if (playedMatches.length > 0) {
                const days = playedMatches.map(m => parseInt(m.date.split(' ')[0]));
                const maxDay = Math.max(...days.filter(d => !isNaN(d)));
                if (maxDay > 0) latestDate = `${maxDay} Junio`;
            }

            return (
                <div className="max-w-md mx-auto min-h-screen relative flex flex-col">
                    {/* Header Pega al Top */}
                    <header className="bg-gradient-to-r from-blue-900 to-teal-800 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-black tracking-tight">Mundial '26</h1>
                                <p className="text-teal-200 text-sm font-medium">Visualizador Interactivo</p>
                            </div>
                            <div className="text-right text-xs bg-white/20 px-3 py-1.5 rounded-lg backdrop-blur-sm">
                                <span className="block font-bold">Datos al</span>
                                {latestDate}
                            </div>
                        </div>

                        {/* Tabs Navigation (Ahora con scroll horizontal para la 3ra pestaña) */}
                        <div className="flex gap-6 mt-6 border-b border-white/20 overflow-x-auto hide-scrollbar">
                            <button 
                                onClick={() => setActiveTab('grupos')}
                                className={`pb-2 px-1 text-sm whitespace-nowrap transition-all duration-300 ${activeTab === 'grupos' ? 'border-b-4 border-teal-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Tablas de Grupos
                            </button>
                            <button 
                                onClick={() => setActiveTab('cruces')}
                                className={`pb-2 px-1 text-sm whitespace-nowrap transition-all duration-300 ${activeTab === 'cruces' ? 'border-b-4 border-orange-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Camino a la Final
                            </button>
                            <button 
                                onClick={() => setActiveTab('estadisticas')}
                                className={`pb-2 px-1 text-sm whitespace-nowrap transition-all duration-300 ${activeTab === 'estadisticas' ? 'border-b-4 border-yellow-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Estadísticas
                            </button>
                        </div>
                    </header>

                    {/* Content Area */}
                    <main className="flex-1 p-4 mt-2">
                        {activeTab === 'grupos' && <StandingsView standings={standings} bestThirds={bestThirds} />}
                        {activeTab === 'cruces' && <KnockoutView standings={standings} bestThirds={bestThirds} />}
                        {activeTab === 'estadisticas' && <StatsView />}
                    </main>
                    
                    <footer className="flex flex-col items-center justify-center p-5 text-xs text-gray-400 border-t bg-gray-50 mt-auto gap-4">
                        <p className="text-center">Aplicación interactiva diseñada por Kineti (kineti.com.co). Los cruces dinámicos se basan en proyecciones del momento.</p>
                        
                        {/* CONTADOR DE VISITAS FUNCIONAL */}
                        <div className="flex flex-col items-center gap-1">
                            <span className="text-[10px] font-semibold uppercase tracking-widest text-gray-400">Visitas Familiares</span>
                            <img 
                                src="https://api.visitorbadge.io/api/visitors?path=mundial26.alex.familia&labelColor=%23f3f4f6&countColor=%23ea580c&labelStyle=none" 
                                alt="Contador de visitas" 
                                className="h-5 shadow-sm rounded-sm"
                            />
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
