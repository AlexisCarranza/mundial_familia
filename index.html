        const calculateStandings = () => {
            const groups = {};
            const groupNames = ['A','B','C','D','E','F','G','H','I','J','K','L'];
            
            // Inicializar grupos vacíos
            groupNames.forEach(g => groups[g] = {});

            MATCHES.forEach(m => {
                // Registrar equipos incluso si no han jugado
                [m.home, m.away].forEach(team => { 
                    if (!groups[m.group][team]) {
                        groups[m.group][team] = { name: team, pts: 0, pj: 0, gf: 0, ga: 0, gd: 0, group: m.group }; 
                    }
                });

                if (m.played) {
                    const h = groups[m.group][m.home];
                    const a = groups[m.group][m.away];
                    
                    h.pj++; a.pj++;
                    h.gf += m.hGoals; h.ga += m.aGoals; h.gd = h.gf - h.ga;
                    a.gf += m.aGoals; a.ga += m.hGoals; a.gd = a.gf - a.ga;

                    if (m.hGoals > m.aGoals) h.pts += 3;
                    else if (m.aGoals > m.hGoals) a.pts += 3;
                    else { h.pts += 1; a.pts += 1; }
                }
            });

            // Convertir a arrays y ordenar
            const sortedGroups = {};
            for (const [gName, teamsObj] of Object.entries(groups)) {
                sortedGroups[gName] = Object.values(teamsObj).sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    return b.gf - a.gf;
                });
            }
            return sortedGroups;
        };

                                            } else if (idx === 2 && isBestThird(team.name)) {

                                                badgeClass = "bg-yellow-100 text-yellow-700 font-bold border border-yellow-200";
                                                badgeText = "3";
                                            } else {
                                                badgeClass = "bg-gray-100 text-gray-500";
                                                badgeText = idx + 1;
                                            }

                                                        </span>
                                                    </td>
                                                    <td className="text-center text-gray-500">{team.pj}</td>
                                                    <td className="text-center text-gray-500">{team.gd > 0 ? `+${team.gd}` : team.gd}</td>
                                                    <td className="text-center font-bold text-gray-800">{team.pts}</td>

            // Reglas de la FIFA
            const fixedMatches = [
                { title: "Fijo 1", t1: getTeam('F',1), t2: getTeam('C',2) },
                { title: "Fijo 2", t1: getTeam('C',1), t2: getTeam('F',2) },
                { title: "Fijo 3", t1: getTeam('H',1), t2: getTeam('J',2) },
                { title: "Fijo 4", t1: getTeam('J',1), t2: getTeam('H',2) },
                { title: "Fijo Segundos 1", t1: getTeam('A',2), t2: getTeam('B',2) },
                { title: "Fijo Segundos 2", t1: getTeam('E',2), t2: getTeam('I',2) },
                { title: "Fijo Segundos 3", t1: getTeam('K',2), t2: getTeam('L',2) },
                { title: "Fijo Segundos 4", t1: getTeam('D',2), t2: getTeam('G',2) },
            ];

            const dynamicMatches = [
                { groupLeader: 'A', leader: getTeam('A',1), targets: ['C','E','F','H','I'] },
                { groupLeader: 'B', leader: getTeam('B',1), targets: ['E','F','G','I','J'] },

                { groupLeader: 'E', leader: getTeam('E',1), targets: ['A','B','C','D','F'] },
                { groupLeader: 'G', leader: getTeam('G',1), targets: ['A','E','H','I','J'] },
                { groupLeader: 'I', leader: getTeam('I',1), targets: ['C','D','F','G','H'] },
                { groupLeader: 'K', leader: getTeam('K',1), targets: ['D','E','I','J','L'] },
                { groupLeader: 'L', leader: getTeam('L',1), targets: ['E','H','I','J','K'] },
            ];

            const MatchCard = ({ matchInfo, type }) => {
                if (type === 'fixed') {
                    return (
                        <div className="card p-3 mb-3 border-l-4 border-blue-500">
                            <div className="flex justify-between items-center text-sm">
                                <div className="flex items-center gap-2 w-2/5">
                                    <img src={getFlagUrl(matchInfo.t1.name)} className="flag" />
                                    <span className="font-semibold truncate">{matchInfo.t1.name}</span>
                                </div>
                                <span className="text-gray-400 font-bold text-xs">VS</span>
                                <div className="flex items-center gap-2 w-2/5 justify-end">
                                    <span className="font-semibold truncate text-right">{matchInfo.t2.name}</span>
                                    <img src={getFlagUrl(matchInfo.t2.name)} className="flag" />
                                </div>
                            </div>
                        </div>
                    );
                }

                // Dynamic Match
                const thirdPlaceCandidates = matchInfo.targets.map(g => {
                    const t = getTeam(g, 3);
                    return t && !t.name.includes("TBD") ? t.name : null;
                }).filter(Boolean);

                return (
                    <div className="card p-3 mb-3 border-l-4 border-orange-400">
                        <div className="mb-2 flex items-center gap-2">
                            <span className="bg-orange-100 text-orange-700 text-[10px] font-bold px-2 py-0.5 rounded">1° Grupo {matchInfo.groupLeader}</span>
                            <img src={getFlagUrl(matchInfo.leader.name)} className="flag shadow-sm" />
                            <span className="font-bold text-gray-800">{matchInfo.leader.name}</span>
                        </div>
                        <div className="bg-gray-50 p-2 rounded text-xs text-gray-600">
                            <p className="font-semibold mb-1">Se enfrenta al 3° de: {matchInfo.targets.join(', ')}</p>
                            <p className="text-[11px] text-gray-500">
                                Candidatos actuales: {thirdPlaceCandidates.length > 0 ? thirdPlaceCandidates.join(', ') : "Por definir"}
                            </p>
                        </div>
                    </div>
                );
            };

            return (
                <div className="pb-12">
                    <h2 className="text-xl font-extrabold text-blue-900 mb-4 flex items-center gap-2">
                        <span className="w-6 h-6 bg-blue-100 text-blue-800 flex items-center justify-center rounded-full text-xs">16</span>
                        Dieciseisavos de Final
                    </h2>
                    
                    <h3 className="text-sm font-bold text-gray-500 uppercase mb-3 ml-2">Cruces Fijos (1ros vs 2dos)</h3>
                    <div className="mb-6">
                        {fixedMatches.slice(0, 4).map((m, i) => <MatchCard key={`f1-${i}`} matchInfo={m} type="fixed" />)}
                    </div>

                    <h3 className="text-sm font-bold text-gray-500 uppercase mb-3 ml-2">Cruces Fijos (2dos vs 2dos)</h3>
                    <div className="mb-6">
                        {fixedMatches.slice(4, 8).map((m, i) => <MatchCard key={`f2-${i}`} matchInfo={m} type="fixed" />)}
                    </div>

                    <h3 className="text-sm font-bold text-orange-600 uppercase mb-3 ml-2 flex items-center gap-2">
                        <span>Cruces Dinámicos</span>
                        <span className="bg-orange-100 text-orange-700 text-[9px] px-1.5 py-0.5 rounded font-bold">Mejores 3ros</span>
                    </h3>
                    <div className="mb-8">
                        {dynamicMatches.map((m, i) => <MatchCard key={`d-${i}`} matchInfo={m} type="dynamic" />)}
                    </div>

                    {/* Placeholder para las siguientes fases */}
                    <div className="mt-8 pt-6 border-t-2 border-dashed border-gray-300">
                        <h2 className="text-xl font-extrabold text-gray-400 mb-4 text-center">Fases Finales</h2>
                        <div className="space-y-3 opacity-60">
                            <div className="card p-4 bg-gray-50 border-2 border-gray-200 text-center flex flex-col items-center justify-center">
                                <span className="font-bold text-gray-500">Octavos de Final</span>
                                <span className="text-xs text-gray-400 mt-1">Esperando clasificados de Dieciseisavos</span>
                            </div>
                            <div className="card p-4 bg-gray-50 border-2 border-gray-200 text-center flex flex-col items-center justify-center w-3/4 mx-auto">
                                <span className="font-bold text-gray-500">Cuartos de Final</span>
                            </div>
                            <div className="flex gap-2 justify-center">
                                <div className="card p-4 bg-gray-50 border-2 border-gray-200 text-center flex flex-col items-center justify-center w-1/2">
                                    <span className="font-bold text-gray-500 text-sm">Semifinal</span>
                                </div>
                                <div className="card p-4 bg-gray-50 border-2 border-gray-200 text-center flex flex-col items-center justify-center w-1/2">
                                    <span className="font-bold text-gray-500 text-sm">Semifinal</span>
                                </div>
                            </div>
                            <div className="card p-4 bg-gradient-to-r from-gray-200 to-gray-300 border-2 border-gray-300 text-center flex flex-col items-center justify-center shadow-inner">
                                <span className="font-black text-gray-600 uppercase tracking-widest">Gran Final</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = React.useState('grupos');
            
            // Cálculos principales
            const standings = calculateStandings();
            
            // Calcular mejores 3ros
            const thirdPlaces = [];
            for (const group in standings) {
                if (standings[group][2]) thirdPlaces.push(standings[group][2]);
            }
            const bestThirds = thirdPlaces.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            }).slice(0, 8); // Top 8

            return (
                <div className="max-w-md mx-auto min-h-screen relative flex flex-col">
                    {/* Header Pega al Top */}
                    <header className="bg-gradient-to-r from-blue-900 to-teal-800 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-black tracking-tight">Mundial '26</h1>
                                <p className="text-teal-200 text-sm font-medium">Visualizador Interactivo</p>
                            </div>
                            <div className="text-right text-xs bg-white/20 px-3 py-1.5 rounded-lg backdrop-blur-sm">
                                <span className="block font-bold">Datos al</span>
                                19 Junio
                            </div>
                        </div>

                        {/* Tabs Navigation */}
                        <div className="flex gap-6 mt-6 border-b border-white/20">
                            <button 
                                onClick={() => setActiveTab('grupos')}
                                className={`pb-2 px-1 text-sm transition-all duration-300 ${activeTab === 'grupos' ? 'border-b-4 border-teal-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Tablas de Grupos
                            </button>
                            <button 
                                onClick={() => setActiveTab('cruces')}
                                className={`pb-2 px-1 text-sm transition-all duration-300 ${activeTab === 'cruces' ? 'border-b-4 border-orange-400 font-bold text-white' : 'text-teal-200/80 hover:text-white'}`}
                            >
                                Camino a la Final
                            </button>
                        </div>
                    </header>

                    {/* Content Area */}
                    <main className="flex-1 p-4 mt-2">
                        {activeTab === 'grupos' 
                            ? <StandingsView standings={standings} bestThirds={bestThirds} /> 
                            : <KnockoutView standings={standings} />
                        }
                    </main>
                    
                    <footer className="text-center p-4 text-xs text-gray-400 border-t bg-gray-50 mt-auto">
                        Aplicación interactiva diseñada para la familia. Los cruces dinámicos se basan en proyecciones del momento.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
